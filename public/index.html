<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cross-Environment Diff Dashboard</title>
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/lodash@4.17.21/lodash.min.js"></script>
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --bg-main: #f8fafc;
            --bg-card: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --diff-added: #f0fdf4;
            --diff-added-border: #bbf7d0;
            --diff-removed: #fef2f2;
            --diff-removed-border: #fecaca;
            --diff-changed: #fffbeb;
            --diff-changed-border: #fef3c7;
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
            --transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { box-sizing: border-box; }
        html, body { height: 100%; margin: 0; padding: 0; overflow: hidden; }
        body { 
            background-color: var(--bg-main); 
            font-family: 'Inter', -apple-system, sans-serif; 
            color: var(--text-main); 
            display: flex; 
            flex-direction: column;
        }
        
        /* Typography */
        h1, h2, h3, h4, h5, h6 { font-weight: 600; letter-spacing: -0.025em; }

        /* Header Styles */
        header { 
            background: white; 
            border-bottom: 1px solid var(--border);
            padding: 16px 32px;
            flex-shrink: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
        }
        .brand-title { 
            font-size: 1.25rem; 
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* Dashboard Styles */
        .dashboard-banner {
            display: flex;
            gap: 16px;
            padding: 12px 32px;
            background: #f1f5f9;
            border-bottom: 1px solid var(--border);
            font-size: 0.85rem;
        }
        .stat-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 4px 12px;
            background: white;
            border-radius: 6px;
            border: 1px solid var(--border);
            font-weight: 600;
        }

        /* Layout */
        .app-container { flex: 1; display: flex; overflow: hidden; }
        
        /* Sidebar Navigation */
        .sidebar { 
            width: 340px; 
            background: white; 
            border-right: 1px solid var(--border);
            display: flex; 
            flex-direction: column;
            transition: var(--transition);
        }
        .sidebar-header { padding: 24px; border-bottom: 1px solid var(--border); }
        .sidebar-scroll { flex: 1; overflow-y: auto; padding: 12px; }
        
        .nav-item { 
            border: 1px solid transparent;
            border-radius: 10px;
            padding: 14px 16px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: var(--transition);
            background: transparent;
            text-align: left;
            width: 100%;
            display: block;
        }
        .nav-item:hover { background: #f1f5f9; }
        .nav-item.active { 
            background: #eef2ff; 
            border-color: #c7d2fe;
        }
        .nav-item.active .nav-title { color: var(--primary); }
        
        .nav-title { font-size: 0.9rem; font-weight: 600; display: block; margin-bottom: 4px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .nav-sub { font-size: 0.75rem; color: var(--text-muted); display: flex; justify-content: space-between; }
        
        /* Main View */
        .main-view { flex: 1; overflow-y: auto; display: flex; flex-direction: column; position: relative; }
        .view-header { 
            padding: 32px 48px; 
            background: white; 
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 5;
        }
        .view-controls {
            padding: 12px 48px;
            background: #f8fafc;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 20px;
        }

        /* Content Sections */
        .content-container { padding: 40px 48px; max-width: 1400px; margin: 0 auto; width: 100%; }
        
        /* Card & Accordion */
        .data-card {
            background: white;
            border: 1px solid var(--border);
            border-radius: 12px;
            box-shadow: var(--shadow-sm);
            margin-bottom: 24px;
            overflow: hidden;
            transition: var(--transition);
        }
        .data-card:hover { box-shadow: var(--shadow-md); }
        
        .card-header {
            padding: 20px 24px;
            background: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            user-select: none;
            border-bottom: 1px solid transparent;
        }
        .card-header.expanded { border-bottom-color: var(--border); }
        .card-header .title { font-weight: 700; font-size: 1rem; color: var(--text-main); display: flex; align-items: center; gap: 12px; }
        .card-header .arrow { transition: transform 0.3s; color: var(--text-muted); }
        .card-header.expanded .arrow { transform: rotate(180deg); }
        
        .card-body {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease-in-out;
            background: #ffffff;
        }
        .card-body.expanded { max-height: 5000px; } /* Large enough value */

        .comparison-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; padding: 24px; }
        .env-section { display: flex; flex-direction: column; gap: 12px; }
        .env-tag { 
            font-size: 0.65rem; 
            font-weight: 800; 
            padding: 4px 8px; 
            border-radius: 4px; 
            background: #f1f5f9; 
            color: var(--text-muted);
            width: fit-content;
            margin-bottom: 8px;
        }

        /* Tree Styles */
        .tree-node { font-family: 'Cascadia Code', 'Fira Code', monospace; font-size: 13px; line-height: 1.8; }
        .tree-row { 
            display: flex; 
            align-items: baseline; 
            padding: 4px 8px; 
            border-radius: 6px; 
            margin-bottom: 2px;
            transition: background-color 0.1s;
            position: relative;
        }
        .tree-row:hover { background-color: #f8fafc; }
        .indent { width: 24px; flex-shrink: 0; border-left: 1px solid #e2e8f0; height: 100%; position: absolute; left: -12px; top: 0; }
        
        .diff-added { background-color: var(--diff-added) !important; color: #166534; }
        .diff-removed { background-color: var(--diff-removed) !important; color: #991b1b; text-decoration: line-through; }
        .diff-changed { background-color: var(--diff-changed) !important; color: #92400e; }
        .diff-ignored { background-color: #f5f3ff !important; color: #6d28d9; border: 1px dashed #c4b5fd !important; }

        .key-text { color: var(--text-main); font-weight: 500; margin-right: 8px; }
        .key-kr { color: var(--text-muted); font-size: 11px; margin-left: 4px; font-weight: 400; }
        .val-text { color: var(--text-muted); word-break: break-all; }
        
        /* Badges */
        .badge-s { 
            font-size: 0.7rem; 
            padding: 4px 10px; 
            border-radius: 9999px; 
            font-weight: 600; 
            border: 1px solid transparent;
        }
        .badge-match { background: #f0fdf4; color: #166534; border-color: #bbf7d0; }
        .badge-mismatch { background: #fef2f2; color: #991b1b; border-color: #fecaca; }
        .badge-orphan { background: #f1f5f9; color: #475569; border-color: #e2e8f0; }

        /* Toggle Switch */
        .switch {
            position: relative;
            display: inline-block;
            width: 44px;
            height: 24px;
        }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #cbd5e1;
            transition: .4s;
            border-radius: 24px;
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 18px; width: 18px;
            left: 3px; bottom: 3px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }
        input:checked + .slider { background-color: var(--primary); }
        input:checked + .slider:before { transform: translateX(20px); }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #cbd5e1; }

        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--text-muted);
            text-align: center;
            padding: 40px;
        }
    </style>
</head>
<body>

<header>
    <div class="brand-title">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 18 22 12 16 6"></polyline><polyline points="8 6 2 12 8 18"></polyline></svg>
        <span>Cross-Env Diff Engine</span>
    </div>
    <div class="d-flex align-items-center gap-3">
        <button class="btn btn-outline-primary btn-sm fw-600" id="btn-export-csv">📥 Export Mismatches (CSV)</button>
        <div id="upload-status" class="badge-s badge-orphan" style="display:none;"></div>
    </div>
</header>

<div class="dashboard-banner" id="summary-dashboard">
    <div class="stat-item">
        <span class="text-muted">Total DTO:</span>
        <span id="stat-total" class="text-primary">0</span>
    </div>
    <div class="stat-item">
        <span class="text-muted">Matched:</span>
        <span id="stat-match" class="text-success">0</span>
    </div>
    <div class="stat-item">
        <span class="text-muted">Mismatched:</span>
        <span id="stat-mismatch" class="text-danger">0</span>
    </div>
</div>

<div class="app-container">
    <!-- Sidebar -->
    <aside class="sidebar" id="dto-sidebar">
        <div class="sidebar-header">
            <h6 class="mb-3 text-uppercase text-muted fw-800" style="font-size: 0.7rem; letter-spacing: 0.1em;">Log Sources</h6>
            <div class="d-flex flex-column gap-2">
                <button class="btn btn-outline-secondary btn-sm text-start" onclick="document.getElementById('upload-dev').click()">
                    <small>AS-IS Log</small>
                    <input type="file" id="upload-dev" hidden accept=".txt,.log" onchange="processUploadedFiles()">
                </button>
                <button class="btn btn-outline-secondary btn-sm text-start" onclick="document.getElementById('upload-qa').click()">
                    <small>TO-BE Log</small>
                    <input type="file" id="upload-qa" hidden accept=".txt,.log" onchange="processUploadedFiles()">
                </button>
                <button class="btn btn-outline-secondary btn-sm text-start" onclick="document.getElementById('upload-meta').click()">
                    <small>항목 정의 (TSV)</small>
                    <input type="file" id="upload-meta" hidden accept=".tsv,.txt" onchange="uploadMetadataFile()">
                </button>
                <button class="btn btn-primary btn-sm mt-2 fw-600" onclick="processUploadedFiles()">🚀 Start Comparison</button>
            </div>
        </div>
        <div class="sidebar-scroll" id="sidebar-list-container">
            <div class="empty-state" style="padding: 60px 20px;">
                <p class="small">No logs loaded yet.</p>
            </div>
        </div>
    </aside>

    <!-- Main View -->
    <main class="main-view">
        <div id="comparison-placeholder" class="empty-state">
            <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round" class="mb-4 opacity-20"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect><line x1="8" y1="21" x2="16" y2="21"></line><line x1="12" y1="17" x2="12" y2="21"></line></svg>
            <h3>Ready to analyze</h3>
            <p>Select a DTO from the sidebar to begin deep comparison.</p>
        </div>

        <div id="comparison-main" style="display: none;">
            <div class="view-header">
                <div class="d-flex justify-content-between align-items-start mb-4">
                    <div>
                        <h2 id="current-srvc-id" class="mb-1">Service Label</h2>
                        <div class="d-flex gap-2 align-items-center">
                            <span id="current-biz-key" class="text-muted small fw-500">Business Key</span>
                            <span id="current-status-badge" class="badge-s">Status</span>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="view-controls">
                <div class="d-flex align-items-center gap-2 me-auto">
                    <label class="small fw-600 text-muted" for="ignore-keys-input">Ignore List:</label>
                    <input type="text" id="ignore-keys-input" class="form-control form-control-sm" style="width: 400px;" placeholder="e.g. trnnNo, tlgrCretDttm, timestamp">
                </div>
                <label class="small fw-600 text-muted" for="filter-mismatch">Show Mismatches Only</label>
                <label class="switch">
                    <input type="checkbox" id="filter-mismatch">
                    <span class="slider"></span>
                </label>
            </div>

            <div class="content-container">
                <!-- Header Block (Accordion) -->
                <div class="data-card" id="card-header-block">
                    <div class="card-header" onclick="toggleAccordion('header-body')">
                        <div class="title">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
                            Common Header
                        </div>
                        <svg class="arrow" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
                    </div>
                    <div class="card-body" id="header-body">
                        <div class="comparison-grid">
                            <div class="env-section">
                                <span class="env-tag">DEV HEADER</span>
                                <div id="tree-header-dev"></div>
                            </div>
                            <div class="env-section">
                                <span class="env-tag">QA HEADER</span>
                                <div id="tree-header-qa"></div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Payload Block (Always Expanded) -->
                <div class="data-card">
                    <div class="card-header expanded" style="cursor: default;">
                        <div class="title">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline></svg>
                            Data Payload
                        </div>
                    </div>
                    <div class="card-body expanded">
                        <div class="comparison-grid">
                            <div class="env-section">
                                <span class="env-tag">DEV DATA</span>
                                <div id="tree-payload-dev"></div>
                            </div>
                            <div class="env-section">
                                <span class="env-tag">QA DATA</span>
                                <div id="tree-payload-qa"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
</div>

<script>
    let comparisonData = [];
    let metadataMap = new Map();
    let showMismatchOnly = false;
    let selectedIdx = -1;
    let customIgnoreKeys = [];

    const defaultIgnoreKeys = [
        'trnnNo', 'tlgrCretDttm', 'rqstDttm', 'ipAddr', 'rqsrIp', 
        'ctfnTokn', 'mciNodeNo', 'tlgrRspnDttm', 'mciSesnId',
        'lastModifiedDate', 'stateStartDateTime', 'id',
        'serverType', 'userTmunIdnfVal', 'Suid', 'acheCmpuYymm'
    ];

    function getActiveIgnoreKeys() {
        return [...defaultIgnoreKeys, ...customIgnoreKeys];
    }

    async function init() {
        document.getElementById('ignore-keys-input').value = defaultIgnoreKeys.join(', ');
        document.getElementById('ignore-keys-input').addEventListener('change', (e) => {
            customIgnoreKeys = e.target.value.split(',').map(k => k.trim()).filter(k => k);
            if (comparisonData.length > 0) reProcessComparison();
        });
        document.getElementById('btn-export-csv').addEventListener('click', exportMismatchesToCsv);
        
        try {
            await autoLoadDefaultFiles();
        } catch (e) {
            console.warn('Auto-load failed', e);
        }
    }

    async function autoLoadDefaultFiles() {
        const statusEl = document.getElementById('upload-status');
        statusEl.style.display = 'block';
        statusEl.innerText = 'Loading defaults...';

        try {
            const [devRes, qaRes, metaRes] = await Promise.all([
                fetch('/data/dev_log.txt'),
                fetch('/data/qa_log.txt'),
                fetch('/data/metadata.tsv')
            ]);
            if (devRes.ok && qaRes.ok) {
                const devContent = await devRes.text();
                const qaContent = await qaRes.text();
                if (metaRes.ok) metadataMap = parseMetadata(await metaRes.text());
                processContents(devContent, qaContent);
            }
        } catch (e) {
            statusEl.style.display = 'none';
        }
    }

    function processContents(devContent, qaContent) {
        const devBlocksRaw = parseLogsFromContent(devContent);
        const qaBlocksRaw = parseLogsFromContent(qaContent);
        const devMap = mapBlocksByLabelAndKey(devBlocksRaw);
        const qaMap = mapBlocksByLabelAndKey(qaBlocksRaw);
        const allKeys = _.union(Array.from(devMap.keys()), Array.from(qaMap.keys()));
        
        comparisonData = allKeys.map((uniqueKey, idx) => {
            const devBlock = devMap.get(uniqueKey) || null;
            const qaBlock = qaMap.get(uniqueKey) || null;
            const dev = devBlock ? devBlock.data : null;
            const qa = qaBlock ? qaBlock.data : null;
            const label = qaBlock ? qaBlock.label : (devBlock ? devBlock.label : 'Unknown');
            const bizKey = findBusinessKey(qa || dev) || 'No Key';
            
            let diffs = [];
            let status = 'MATCH';
            if (dev && qa) {
                diffs = getDiff(dev, qa, getActiveIgnoreKeys());
                status = diffs.filter(d => d.type !== 'IGNORED').length === 0 ? 'MATCH' : 'MISMATCH';
            } else {
                status = 'ORPHAN';
                diffs = dev ? [{path: 'root', type: 'REMOVED'}] : [{path: 'root', type: 'ADDED'}];
            }

            return { id: idx + 1, label, bizKey, dev, qa, diffs, status, 
                     serviceId: (qa?.header?.rcveSrvcId) || (dev?.header?.rcveSrvcId) || 'Unknown' };
        });

        renderSidebar();
        updateDashboard();
        const statusEl = document.getElementById('upload-status');
        statusEl.className = 'badge-s badge-match';
        statusEl.innerText = `Analysis Ready: ${comparisonData.length} items`;
        if (comparisonData.length > 0) selectDto(0);
    }

    function reProcessComparison() {
        const currentSelectedId = selectedIdx !== -1 ? comparisonData[selectedIdx].id : -1;
        comparisonData.forEach(item => {
            if (item.dev && item.qa) {
                item.diffs = getDiff(item.dev, item.qa, getActiveIgnoreKeys());
                item.status = item.diffs.filter(d => d.type !== 'IGNORED').length === 0 ? 'MATCH' : 'MISMATCH';
            }
        });
        renderSidebar();
        updateDashboard();
        if (currentSelectedId !== -1) {
            const newIdx = comparisonData.findIndex(d => d.id === currentSelectedId);
            if (newIdx !== -1) selectDto(newIdx);
        }
    }

    function updateDashboard() {
        const total = comparisonData.length;
        const match = comparisonData.filter(d => d.status === 'MATCH').length;
        const mismatch = comparisonData.filter(d => d.status === 'MISMATCH').length;
        
        document.getElementById('stat-total').innerText = total;
        document.getElementById('stat-match').innerText = match;
        document.getElementById('stat-mismatch').innerText = mismatch;
    }

    function renderSidebar() {
        const container = document.getElementById('sidebar-list-container');
        container.innerHTML = '';
        comparisonData.forEach((item, index) => {
            if (showMismatchOnly && item.status === 'MATCH') return;
            
            const btn = document.createElement('button');
            btn.className = 'nav-item' + (selectedIdx === index ? ' active' : '');
            btn.onclick = () => selectDto(index);
            
            let badgeClass = 'badge-match';
            if (item.status === 'MISMATCH') badgeClass = 'badge-mismatch';
            else if (item.status === 'ORPHAN') badgeClass = 'badge-orphan';

            btn.innerHTML = `
                <span class="nav-title" title="${item.label}">${item.label}</span>
                <div class="nav-sub">
                    <span>${item.serviceId}</span>
                    <span class="badge-s ${badgeClass}">${item.status}</span>
                </div>
            `;
            container.appendChild(btn);
        });
    }

    function selectDto(index) {
        selectedIdx = index;
        document.querySelectorAll('.nav-item').forEach((el, i) => {
            // Index might mismatch if filtered, but sidebar items have index attribute or similar
        });
        
        // Refined selection highlighting
        const navItems = document.querySelectorAll('.nav-item');
        navItems.forEach(el => el.classList.remove('active'));
        // Find by content or just re-render sidebar properly
        renderSidebar(); 

        document.getElementById('comparison-placeholder').style.display = 'none';
        document.getElementById('comparison-main').style.display = 'block';

        const data = comparisonData[index];
        document.getElementById('current-srvc-id').innerText = data.label;
        document.getElementById('current-biz-key').innerText = data.bizKey;
        
        const badge = document.getElementById('current-status-badge');
        badge.innerText = data.status;
        badge.className = 'badge-s ' + (data.status === 'MATCH' ? 'badge-match' : (data.status === 'ORPHAN' ? 'badge-orphan' : 'badge-mismatch'));

        ['tree-header-dev', 'tree-header-qa', 'tree-payload-dev', 'tree-payload-qa'].forEach(id => document.getElementById(id).innerHTML = '');
        
        const devHeader = data.dev?.header || null;
        const devPayload = devHeader ? _.omit(data.dev, 'header') : data.dev;
        const qaHeader = data.qa?.header || null;
        const qaPayload = qaHeader ? _.omit(data.qa, 'header') : data.qa;

        renderTree(devHeader, data.diffs, 'header', document.getElementById('tree-header-dev'), 'DEV');
        renderTree(qaHeader, data.diffs, 'header', document.getElementById('tree-header-qa'), 'QA');
        renderTree(devPayload, data.diffs, '', document.getElementById('tree-payload-dev'), 'DEV');
        renderTree(qaPayload, data.diffs, '', document.getElementById('tree-payload-qa'), 'QA');
    }

    function renderTree(obj, diffs, path, container, env) {
        if (!obj) {
            container.innerHTML = '<span class="text-muted small">N/A</span>';
            return;
        }

        const keys = Object.keys(obj);
        keys.forEach(key => {
            const currentPath = path ? (path === 'header' ? `header.${key}` : `${path}.${key}`) : key;
            const diff = diffs ? diffs.find(d => d.path === currentPath) : null;
            
            if (showMismatchOnly && (!diff || diff.type === 'IGNORED') && !hasDiffInChildren(currentPath, diffs)) return;

            const row = document.createElement('div');
            row.className = 'tree-row';
            if (diff) {
                if (diff.type === 'ADDED' && env === 'QA') row.classList.add('diff-added');
                else if (diff.type === 'REMOVED' && env === 'DEV') row.classList.add('diff-removed');
                else if (diff.type === 'CHANGED') row.classList.add('diff-changed');
                else if (diff.type === 'IGNORED') row.classList.add('diff-ignored');
            }

            const krName = metadataMap.get(key);
            const keyHtml = `<span class="key-text">${key}${krName ? `<span class="key-kr">(${krName})</span>` : ''}:</span>`;

            if (typeof obj[key] === 'object' && obj[key] !== null) {
                const isArray = Array.isArray(obj[key]);
                row.innerHTML = `${keyHtml} <span class="val-text">${isArray ? '[ ]' : '{ }'}</span>`;
                container.appendChild(row);
                const childContainer = document.createElement('div');
                childContainer.style.marginLeft = '20px';
                childContainer.style.borderLeft = '1px solid #f1f5f9';
                container.appendChild(childContainer);
                renderTree(obj[key], diffs, currentPath, childContainer, env);
            } else {
                const val = maskSensitiveData(obj[key]);
                row.innerHTML = `${keyHtml} <span class="val-text">${JSON.stringify(val)}</span>`;
                container.appendChild(row);
            }
        });
    }

    function maskSensitiveData(val) {
        if (typeof val !== 'string') return val;
        // 주민번호 (6-7)
        val = val.replace(/\d{6}-\d{7}/g, (m) => m.substring(0, 7) + '*******');
        // 전화번호
        val = val.replace(/010-\d{4}-\d{4}/g, (m) => m.substring(0, 4) + '****' + m.substring(8));
        // 계좌번호 (가정: 10-15자리)
        val = val.replace(/\d{10,15}/g, (m) => m.substring(0, 3) + '********' + m.substring(m.length - 2));
        return val;
    }

    function exportMismatchesToCsv() {
        const mismatches = comparisonData.filter(d => d.status === 'MISMATCH');
        if (mismatches.length === 0) {
            alert('No mismatches to export!');
            return;
        }

        let csv = 'ID,Label,Service ID,Business Key,Status,Mismatch Count\n';
        mismatches.forEach(m => {
            const mismatchCount = m.diffs.filter(d => d.type !== 'IGNORED').length;
            csv += `${m.id},"${m.label}","${m.serviceId}","${m.bizKey}","${m.status}",${mismatchCount}\n`;
        });

        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = `diff_report_${new Date().toISOString().slice(0,10)}.csv`;
        link.click();
    }

    function getDiff(obj1, obj2, ignore, path = '') {
        let diffs = [];
        const currentKey = path.split('.').pop();
        const isIgnored = ignore.includes(currentKey) || (path && ignore.includes(path));

        if (Array.isArray(obj1) && Array.isArray(obj2)) {
            const matchingKeys = ['polyNo', 'id', 'contractNo', 'trnnNo', 'key'];
            let remainingObj2 = [...obj2];
            obj1.forEach((item1, index) => {
                const curPath = `${path}[${index}]`;
                let matchIdx = -1;
                if (_.isObject(item1)) {
                    const idKey = matchingKeys.find(k => _.has(item1, k));
                    if (idKey) matchIdx = remainingObj2.findIndex(item2 => item2[idKey] === item1[idKey]);
                }
                if (matchIdx === -1) matchIdx = remainingObj2.findIndex(item2 => _.isEqual(item1, item2));
                
                if (matchIdx !== -1) {
                    const item2 = remainingObj2.splice(matchIdx, 1)[0];
                    diffs = diffs.concat(getDiff(item1, item2, ignore, curPath));
                } else {
                    diffs.push({ path: curPath, type: 'REMOVED', oldValue: item1 });
                }
            });
            remainingObj2.forEach((item2, index) => {
                diffs.push({ path: `${path}[+${index}]`, type: 'ADDED', newValue: item2 });
            });
        } else if (_.isObject(obj1) && _.isObject(obj2)) {
            const keys = _.union(_.keys(obj1), _.keys(obj2));
            keys.forEach(key => {
                const curPath = path ? `${path}.${key}` : key;
                if (!_.has(obj1, key)) {
                    diffs.push({ path: curPath, type: ignore.includes(key) ? 'IGNORED' : 'ADDED', newValue: obj2[key] });
                } else if (!_.has(obj2, key)) {
                    diffs.push({ path: curPath, type: ignore.includes(key) ? 'IGNORED' : 'REMOVED', oldValue: obj1[key] });
                } else {
                    diffs = diffs.concat(getDiff(obj1[key], obj2[key], ignore, curPath));
                }
            });
        } else if (!_.isEqual(obj1, obj2)) {
            diffs.push({ path, type: isIgnored ? 'IGNORED' : 'CHANGED', oldValue: obj1, newValue: obj2 });
        }
        return diffs;
    }

    // --- Parser Utils ---
    function parseLogsFromContent(content) {
        const jsonBlocks = [];
        const matchedRanges = [];
        const isOverlapping = (start, end) => matchedRanges.some(range => (start >= range.start && start < range.end) || (end > range.start && end <= range.end));

        // Pattern 1: Standard
        const stdRegex = /\[data=({[\s\S]*?}),\s*encrypt=false\]/g;
        let m;
        while ((m = stdRegex.exec(content))) {
            try { 
                const data = JSON.parse(m[1]);
                jsonBlocks.push({ label: data.header?.rcveSrvcId || 'Standard DTO', data, type: 'STANDARD' });
                matchedRanges.push({ start: m.index, end: stdRegex.lastIndex });
            } catch (e) {}
        }
        // Pattern 2: BAC
        const bacRegex = /\[(BAC[a-zA-Z0-9]+)\]\s*([^\{]*)\s*(?=\{)/g;
        while ((m = bacRegex.exec(content))) {
            const body = extractMatchedBlock(content, m.index + m[0].length);
            if (body) {
                const end = m.index + m[0].length + body.length;
                if (!isOverlapping(m.index, end)) {
                    try { 
                        jsonBlocks.push({ label: m[2].trim() || m[1], data: JSON.parse(body), type: 'CUSTOM' }); 
                        matchedRanges.push({ start: m.index, end });
                    } catch (e) {}
                }
            }
        }
        // Pattern 3: Raw
        let rawCount = 0;
        for (let i = 0; i < content.length; i++) {
            if ((content[i] === '{' || content[i] === '[') && !isOverlapping(i, i + 1)) {
                const block = extractMatchedBlock(content, i);
                if (block && block.length > 10) {
                    const sanitized = sanitizeJson(block);
                    try {
                        const data = JSON.parse(sanitized);
                        rawCount++;
                        const label = getSmartLabel(data, `JSON Block #${rawCount}`);
                        jsonBlocks.push({ label, data, type: 'RAW' });
                        matchedRanges.push({ start: i, end: i + block.length });
                        i += block.length - 1;
                    } catch (e) {}
                }
            }
        }
        return jsonBlocks;
    }

    function sanitizeJson(raw) {
        let cleaned = raw.trim();
        if (cleaned.startsWith('{') && cleaned.endsWith('}')) {
            const inner = cleaned.substring(1, cleaned.length - 1).trim();
            if (inner.startsWith('[') && inner.endsWith(']')) return `{"data": ${inner}}`;
        }
        return cleaned;
    }

    function getSmartLabel(data, fallback) {
        if (!data) return fallback;
        const target = Array.isArray(data) ? data[0] : (data.data && Array.isArray(data.data) ? data.data[0] : data);
        if (!target || typeof target !== 'object') return fallback;
        const priorityKeys = ['polyNo', 'trnnNo', 'id', 'rcveSrvcId', 'emnb', 'srvcId'];
        for (const key of priorityKeys) {
            if (target[key]) return `${key}: ${target[key]}`;
            if (target.header && target.header[key]) return `${key}: ${target.header[key]}`;
        }
        return fallback;
    }

    function extractMatchedBlock(content, startIndex) {
        const startChar = content[startIndex];
        const endChar = startChar === '{' ? '}' : (startChar === '[' ? ']' : null);
        if (!endChar) return null;
        let count = 0, found = false, result = '';
        for (let i = startIndex; i < content.length; i++) {
            if (content[i] === startChar) { count++; found = true; }
            else if (content[i] === endChar) count--;
            if (found) { result += content[i]; if (count === 0) return result; }
        }
        return null;
    }

    function hasDiffInChildren(currentPath, diffs) {
        if (!diffs) return false;
        return diffs.some(d => d.path.startsWith(currentPath + '.'));
    }

    function toggleAccordion(id) {
        const body = document.getElementById(id);
        const header = body.previousElementSibling;
        body.classList.toggle('expanded');
        header.classList.toggle('expanded');
    }

    document.getElementById('filter-mismatch').addEventListener('change', (e) => {
        showMismatchOnly = e.target.checked;
        renderSidebar();
    });

    function mapBlocksByLabelAndKey(blocks) {
        const map = new Map(), counts = new Map();
        blocks.forEach(b => {
            let key = findBusinessKey(b.data) || "UNK";
            counts.set(key, (counts.get(key) || 0) + 1);
            map.set(`${key}__${counts.get(key)}`, b);
        });
        return map;
    }

    function findBusinessKey(obj) {
        if (!obj) return null;
        const candidates = ['contractNo', 'polyNo', 'id', 'key', 'custId'];
        for (const k of candidates) if (obj[k]) return String(obj[k]);
        if (obj.header) for (const k of candidates) if (obj.header[k]) return String(obj.header[k]);
        return null;
    }

    function parseMetadata(content) {
        const map = new Map();
        content.split(/\r?\n/).forEach(line => {
            const cols = line.split('\t');
            if (cols.length >= 2) map.set(cols[1].trim(), cols[0].trim());
        });
        return map;
    }

    async function uploadMetadataFile() {
        const file = document.getElementById('upload-meta').files[0];
        if (!file) return;
        const content = await file.text();
        metadataMap = parseMetadata(content);
        const statusEl = document.getElementById('upload-status');
        statusEl.style.display = 'block';
        statusEl.className = 'badge-s badge-match';
        statusEl.innerText = `Metadata Loaded: ${metadataMap.size} items`;
        if (selectedIdx !== -1) selectDto(selectedIdx);
    }

    async function processUploadedFiles() {
        const devFile = document.getElementById('upload-dev').files[0];
        const qaFile = document.getElementById('upload-qa').files[0];
        if (!devFile || !qaFile) return;
        const [devC, qaC] = await Promise.all([devFile.text(), qaFile.text()]);
        processContents(devC, qaC);
    }

    init();
</script>

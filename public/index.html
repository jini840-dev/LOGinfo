<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cross-Environment Diff Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .diff-container { font-family: monospace; font-size: 13px; white-space: pre-wrap; padding: 15px; border-radius: 5px; height: 500px; overflow-y: auto; }
        .qa-view { background-color: #fff; border: 1px solid #dee2e6; }
        .dev-view { background-color: #fff; border: 1px solid #dee2e6; }
        .highlight-change { background-color: #fff3cd; border: 1px solid #ffeeba; }
        .badge-match { background-color: #d4edda; color: #155724; }
        .badge-mismatch { background-color: #f8d7da; color: #721c24; }
        .diff-item { margin-bottom: 20px; border-bottom: 2px solid #eee; padding-bottom: 20px; }
    </style>
</head>
<body>
<div class="container-fluid py-4">
    <header class="mb-4">
        <h2>🚀 Cross-Environment Diff Dashboard</h2>
        <p class="text-muted">QA 환경과 Dev 환경의 API 결과를 실시간 비교합니다.</p>
    </header>

    <div id="results">
        <!-- 결과가 여기에 렌더링됩니다 -->
        <div class="text-center py-5">
            <div class="spinner-border text-primary" role="status"></div>
            <p>데이터를 분석 중입니다...</p>
        </div>
    </div>
</div>

<script src="diff-engine.bundle.js"></script>
<script>
    async function loadResults() {
        try {
            // 정적 JSON 파일 로드
            const [qaRes, devRes] = await Promise.all([
                fetch('/data/qa_data.json'),
                fetch('/data/dev_data.json')
            ]);
            
            const qaBlocks = await qaRes.json();
            const devBlocks = await devRes.json();
            
            const ignoreKeys = ['trnnNo', 'tlgrCretDttm', 'rqstDttm', 'ipAddr', 'rqsrIp', 'ctfnTokn', 'mciNodeNo'];
            const limit = Math.min(qaBlocks.length, devBlocks.length);
            const results = [];

            for (let i = 0; i < limit; i++) {
                const qa = qaBlocks[i];
                const dev = devBlocks[i];
                // 번들링된 diffEngine 사용
                const diffs = window.diffEngine.getDiff(qa, dev, ignoreKeys);
                
                results.push({
                    id: i + 1,
                    serviceId: qa.header?.rcveSrvcId || 'Unknown',
                    qa,
                    dev,
                    diffs,
                    status: diffs.length === 0 ? 'MATCH' : 'MISMATCH'
                });
            }

            renderResults(results);
        } catch (e) {
            document.getElementById('results').innerHTML = `<div class="alert alert-danger">에러 발생: ${e.message}</div>`;
        }
    }

    function renderResults(results) {
        const container = document.getElementById('results');
        container.innerHTML = '';

        results.forEach(res => {
            const diffHtml = `
                <div class="diff-item card shadow-sm p-3 mb-4">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <h5 class="mb-0">#${res.id} Service: <span class="text-primary">${res.serviceId}</span></h5>
                        <span class="badge ${res.status === 'MATCH' ? 'badge-match text-success' : 'badge-mismatch text-danger'} p-2 border">
                            ${res.status}
                        </span>
                    </div>
                    
                    <div class="row">
                        <div class="col-md-6">
                            <h6>QA Environment</h6>
                            <div class="diff-container qa-view">${JSON.stringify(res.qa, null, 2)}</div>
                        </div>
                        <div class="col-md-6">
                            <h6>Dev Environment</h6>
                            <div class="diff-container dev-view">${JSON.stringify(res.dev, null, 2)}</div>
                        </div>
                    </div>

                    ${res.diffs.length > 0 ? `
                    <div class="mt-3">
                        <h6>Differences Found:</h6>
                        <ul class="list-group">
                            ${res.diffs.map(d => `
                                <li class="list-group-item list-group-item-warning">
                                    <strong>Path:</strong> ${d.path}<br>
                                    <span class="text-danger">- QA: ${JSON.stringify(d.oldValue !== undefined ? d.oldValue : "N/A")}</span><br>
                                    <span class="text-success">+ Dev: ${JSON.stringify(d.newValue !== undefined ? d.newValue : "N/A")}</span>
                                </li>
                            `).join('')}
                        </ul>
                    </div>
                    ` : ''}
                </div>
            `;
            container.innerHTML += diffHtml;
        });
    }

    loadResults();
</script>
</body>
</html>
